# biletsatis.omurgenc.dev — Nginx (PM2 deploy)
# root DİZİNİ OLMALI: /var/www/biletsatis/f/dist (deploy.sh frontend build ile dolar)
# Backend 3001'de dinlemeli (b/.env.production PORT=3001)
# Kopyala: sudo cp deploy/nginx.conf /etc/nginx/sites-available/biletsatis
# SSL: sudo certbot --nginx -d biletsatis.omurgenc.dev

server {
    listen 80;
    server_name biletsatis.omurgenc.dev;

    root /var/www/biletsatis/f/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /uploads {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        access_log off;
    }
}

# SSL (certbot sonrası otomatik eklenir; istersen manuel:
